# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.mailer_from_default: 'no-reply@vos.local'
    app.mailer_from: '%env(default:app.mailer_from_default:APP_MAILER_FROM)%'
    app.mailer_from_address_default: 'no-reply@vos.local'
    app.mailer_from_address: '%env(default:app.mailer_from_address_default:MAILER_FROM)%'
    app.app_name_default: 'VOS'
    app.mailer_from_name: '%env(default:app.app_name_default:APP_NAME)%'
    app.groq_api_key_default: ''
    app.abstract_api_key_default: ''
    app.groq_api_key: '%env(default:app.groq_api_key_default:GROQ_API_KEY)%'
    app.groq_model_default: 'llama-3.1-8b-instant'
    app.groq_model: '%env(default:app.groq_model_default:GROQ_MODEL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $projectDir: '%kernel.project_dir%'
            $mailerFromAddress: '%app.mailer_from%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\GroqReasonEnhancer:
        arguments:
            $groqApiKey: '%env(default::GROQ_API_KEY)%'

    App\Service\PasswordResetService:
        arguments:
            $mailerFrom: '%env(default::MAILER_FROM)%'
            $appName: '%env(default::APP_NAME)%'

    App\Service\EmailVerificationService:
        arguments:
            $abstractApiKey: '%env(default:app.abstract_api_key_default:ABSTRACT_API_KEY)%'

    # Doctrine Doctor DataCollector for Profiler
    App\DataCollector\DoctorDataCollector:
        tags:
            - { name: data_collector, template: '@Profiler/doctor', id: 'app.doctor' }

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\EventListener\AdminAuthenticationListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 10 }

    App\Service\candidature\CVAnalysisService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'
            $logger: '@logger'

    App\EventListener\NoCacheResponseListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response, priority: -10 }

    App\Service\OffreNotificationService:
        bind:
            $mailerFromAddress: '%app.mailer_from_address%'
            $mailerFromName: '%app.mailer_from_name%'

    App\Service\CriteriaSuggestionAiService:
        bind:
            $groqApiKey: '%app.groq_api_key%'
            $groqModel: '%app.groq_model%'

    App\Service\OffreDescriptionAiService:
        bind:
            $groqApiKey: '%app.groq_api_key%'
            $groqModel: '%app.groq_model%'

    App\Service\OffreTranslationAiService:
        bind:
            $groqApiKey: '%app.groq_api_key%'
            $groqModel: '%app.groq_model%'

    App\Service\OffreChatFilterAiService:
        bind:
            $groqApiKey: '%app.groq_api_key%'
            $groqModel: '%app.groq_model%'

    App\Service\ContractReminderAiService:
        bind:
            $groqApiKey: '%app.groq_api_key%'
            $groqModel: '%app.groq_model%'
