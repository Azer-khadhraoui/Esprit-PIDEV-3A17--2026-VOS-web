<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Connexion | VOS</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 128 128%22><text y=%221.2em%22 font-size=%2296%22>??</text><text y=%221.3em%22 x=%220.2em%22 font-size=%2276%22 fill=%22%23fff%22>sf</text></svg>">
            <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/signin.css">

            <script>
        document.addEventListener('DOMContentLoaded', function () {
            const passwordInput = document.getElementById('password');
            const toggleButton = document.querySelector('[data-password-toggle]');

            if (!passwordInput || !toggleButton) {
                return;
            }

            toggleButton.addEventListener('click', function () {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleButton.setAttribute('aria-label', isPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
                toggleButton.classList.toggle('is-visible', isPassword);
            });
        });
    </script>

                    </head>
    <body>
            <div class="signin-page">
        <header class="top-nav">
            <div class="brand">
                <img src="/images/logo.png" alt="VOS Logo" class="logo-img">
            </div>
            <nav>
                <a href="/signin">Accueil</a>
                <a href="/contact">Contact</a>
                <a href="/about">Ŕ propos</a>
            </nav>
        </header>

        <main class="signin-layout">
            <section class="form-side">
                <div class="form-card">
                    <h1>Se connecter ŕ VOS</h1>
                    <p class="signup-hint">Pas encore de compte ? <a href="/signup">S'inscrire</a></p>

                                        
                    <form method="post" class="signin-form">
                        <div class="field">
                            <label for="email">Adresse e-mail</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="field">
                            <label for="password">Mot de passe</label>
                            <div class="password-field">
                                <input type="password" id="password" name="password" required>
                                <button type="button" class="toggle-password" data-password-toggle aria-label="Afficher le mot de passe" title="Afficher le mot de passe">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path d="M12 5C7 5 2.73 8.11 1 12.5 2.73 16.89 7 20 12 20s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"></path>
                                        <circle cx="12" cy="12" r="2.5"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="field-remember">
                            <label>
                                <input type="checkbox" name="remember" id="remember">
                                Se souvenir de moi
                            </label>
                            <a href="/forgot-password">Mot de passe oublié ?</a>
                        </div>

                        <button type="submit" class="btn-primary">Connexion</button>
                    </form>
                </div>
            </section>

            <section class="visual-side">
                <div class="visual-card">
                    <img src="/images/signin.png" alt="Illustration connexion">
                </div>
            </section>
        </main>
    </div>
    </body>
</html>
